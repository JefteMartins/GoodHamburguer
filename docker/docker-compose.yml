services:
  migrations:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    command: ["--migrate-only"]
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Database__Host: mysql
      Database__Port: 3306
      Database__Name: ${MYSQL_DATABASE}
      Database__User: ${MYSQL_APP_USER}
      Database__Password: ${MYSQL_APP_PASSWORD}
      Database__RunMigrationsOnly: "true"
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Database__Host: mysql
      Database__Port: 3306
      Database__Name: ${MYSQL_DATABASE}
      Database__User: ${MYSQL_APP_USER}
      Database__Password: ${MYSQL_APP_PASSWORD}
    ports:
      - "8081:8080"
    depends_on:
      migrations:
        condition: service_completed_successfully

  blazor:
    build:
      context: ..
      dockerfile: docker/blazor/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Api__BaseUrl: http://api:8080
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_started

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_APP_USER}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
