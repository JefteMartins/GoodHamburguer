services:
  api:
    build:
      context: ..
      dockerfile: docker/api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=mysql;Port=3306;Database=goodhamburguer;User=root;Password=root
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy

  blazor:
    build:
      context: ..
      dockerfile: docker/blazor/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Api__BaseUrl: http://api:8080
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_started

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: goodhamburguer
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
