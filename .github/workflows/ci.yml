name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore GoodHamburguer.slnx

      - name: Build
        run: dotnet build GoodHamburguer.slnx --no-restore -v minimal

      - name: Unit tests
        run: dotnet test tests/GoodHamburguer.UnitTests/GoodHamburguer.UnitTests.csproj --no-build -v minimal

      - name: Integration tests
        run: dotnet test tests/GoodHamburguer.IntegrationTests/GoodHamburguer.IntegrationTests.csproj --no-build -v minimal
